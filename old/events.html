<script type="module">

import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        },
        {

            title: "Properties of mirror modes in the magnetosheath",
            authors: "Génot et al.",
            year: 2009,
            journal: "Ann. Geophys."
        }
    ]
};

const eventTypes = Object.keys(papers);

function getRandomPaper(eventType) {
    const typeKey = papers[eventType] ? eventType : eventTypes[Math.floor(Math.random() * eventTypes.length)];
    const paperList = papers[typeKey];
    return paperList[Math.floor(Math.random() * paperList.length)];
}

// ============ DOM ELEMENTS ============
const viewport = document.getElementById('viewport');
const popup = document.getElementById('popup');
const popupTitle = document.getElementById('popup-title');
const popupContent = document.getElementById('popup-content');
const popupClose = document.getElementById('popup-close');
const connectorLine = document.getElementById('connector-line');
const connectorDot = document.getElementById('connector-dot');
const colorbar = document.getElementById('colorbar');
const colorbarLabels = document.getElementById('colorbar-labels');
const colorbarTitle = document.getElementById('colorbar-title');

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050510);

const camera = new THREE.PerspectiveCamera(45, viewport.clientWidth / viewport.clientHeight, 0.1, 500);
camera.position.set(30, 20, 30);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(viewport.clientWidth, viewport.clientHeight);
viewport.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// Earth
const earth = new THREE.Mesh(
    new THREE.SphereGeometry(1, 32, 32),
    new THREE.MeshBasicMaterial({ color: 0x0066cc, wireframe: true })
);
scene.add(earth);

scene.add(new THREE.AxesHelper(8));

// ============ BOUNDARY PARAMETERS ============
let currentR0 = 10.5;
const mpAlpha = 0.6;
const bsScale = 1.35;

function getMagnetopauseR(theta, r0) {
    return r0 * Math.pow(2 / (1 + Math.cos(theta)), mpAlpha);
}

function getBowShockR(theta, r0) {
    return r0 * bsScale * Math.pow(2 / (1 + Math.cos(theta)), mpAlpha);
}

function createMagnetopauseSurface(r0) {
    const points = [];
    for (let i = 0; i <= 50; i++) {
        const theta = (i / 50) * Math.PI * 0.85;
        const r = getMagnetopauseR(theta, r0);
        points.push(new THREE.Vector2(r * Math.sin(theta), r * Math.cos(theta)));
    }
    const geo = new THREE.LatheGeometry(points, 64);
    geo.rotateZ(-Math.PI / 2);
    return new THREE.Mesh(geo, new THREE.MeshBasicMaterial({
        color: 0x00aaff, transparent: true, opacity: 0.12,
        side: THREE.DoubleSide, depthWrite: false
    }));
}

function createMagnetopauseWire(r0) {
    const group = new THREE.Group();
    for (let p = 0; p < 12; p++) {
        const phi = (p / 12) * Math.PI * 2;
        const pts = [];
        for (let i = 0; i <= 40; i++) {
            const theta = (i / 40) * Math.PI * 0.85;
            const r = getMagnetopauseR(theta, r0);
            const x = r * Math.cos(theta);
            const rho = r * Math.sin(theta);
            pts.push(new THREE.Vector3(x, rho * Math.cos(phi), rho * Math.sin(phi)));
        }
        group.add(new THREE.Line(
            new THREE.BufferGeometry().setFromPoints(pts),
            new THREE.LineBasicMaterial({ color: 0x00ddff, transparent: true, opacity: 0.4 })
        ));
    }
    return group;
}

function createBowShockSurface(r0) {
    const points = [];
    for (let i = 0; i <= 50; i++) {
        const theta = (i / 50) * Math.PI * 0.7;
        const r = getBowShockR(theta, r0);
        points.push(new THREE.Vector2(r * Math.sin(theta), r * Math.cos(theta)));
    }
    const geo = new THREE.LatheGeometry(points, 64);
    geo.rotateZ(-Math.PI / 2);
    return new THREE.Mesh(geo, new THREE.MeshBasicMaterial({
        color: 0xff6600, transparent: true, opacity: 0.08,
        side: THREE.DoubleSide, depthWrite: false
    }));
}

let mpSurface, mpWire, bsSurface;

function rebuildBoundaries(r0) {
    if (mpSurface) scene.remove(mpSurface);
    if (mpWire) scene.remove(mpWire);
    if (bsSurface) scene.remove(bsSurface);
    
    mpSurface = createMagnetopauseSurface(r0);
    mpWire = createMagnetopauseWire(r0);
    bsSurface = createBowShockSurface(r0);
    
    if (document.getElementById('chk-mp').checked) {
        scene.add(mpSurface);
        scene.add(mpWire);
    }
    if (document.getElementById('chk-bs').checked) {
        scene.add(bsSurface);
    }
    
    if (document.getElementById('chk-slice').checked) {
        rebuildDensitySlice();
    }
}

rebuildBoundaries(currentR0);

// ============ MAGNETOSHEATH DENSITY MODEL ============
function getMagnetosheathDensity(x, y, z, r0) {
    const rho = Math.sqrt(y * y + z * z);
    const r = Math.sqrt(x * x + rho * rho);
    const theta = Math.atan2(rho, x);
    
    if (theta > Math.PI * 0.7 || theta < 0) return NaN;
    if (r < 1.0) return NaN;
    
    const rMP = getMagnetopauseR(theta, r0);
    const rBS = getBowShockR(theta, r0);
    
    if (r < rMP || r > rBS) return NaN;
    
    const t = (rBS - r) / (rBS - rMP);
    const n_sw = 5.0;
    const compressionRatio = 4.0;
    const n_postShock = n_sw * compressionRatio;
    const stagnationFactor = 1.0 + 1.5 * Math.pow(t, 1.5);
    const angularFactor = Math.pow(Math.cos(theta * 0.8), 0.5);
    
    let density = n_postShock * stagnationFactor * angularFactor;
    density = Math.max(5, Math.min(55, density));
    
    return density;
}

// ============ COLORMAP ============
function densityToColor(n, nMin, nMax) {
    if (isNaN(n)) return null;
    
    let t = (n - nMin) / (nMax - nMin);
    t = Math.max(0, Math.min(1, t));
    
    let r, g, b;
    if (t < 0.25) {
        r = 0; g = t * 4; b = 1;
    } else if (t < 0.5) {
        r = 0; g = 1; b = 1 - (t - 0.25) * 4;
    } else if (t < 0.75) {
        r = (t - 0.5) * 4; g = 1; b = 0;
    } else {
        r = 1; g = 1 - (t - 0.75) * 4; b = 0;
    }
    
    return new THREE.Color(r, g, b);
}

// ============ DENSITY SLICE ============
let sliceMesh = null;
let slicePlane = 'xy';
let slicePosition = 0;
let sliceOpacity = 0.8;
const gridSize = 256;
const gridExtent = 25;

function createDensitySlice() {
    const nMin = 5;
    const nMax = 50;
    
    const geometry = new THREE.PlaneGeometry(gridExtent * 2, gridExtent * 2, gridSize - 1, gridSize - 1);
    const positions = geometry.attributes.position;
    const colors = new Float32Array(positions.count * 3);
    const alphas = new Float32Array(positions.count);
    
    for (let i = 0; i < positions.count; i++) {
        const u = positions.getX(i);
        const v = positions.getY(i);
        
        let x, y, z;
        if (slicePlane === 'xy') {
            x = u; y = v; z = slicePosition;
        } else if (slicePlane === 'xz') {
            x = u; y = slicePosition; z = v;
        } else {
            x = slicePosition; y = u; z = v;
        }
        
        const n = getMagnetosheathDensity(x, y, z, currentR0);
        
        if (isNaN(n)) {
            colors[i * 3] = 0;
            colors[i * 3 + 1] = 0;
            colors[i * 3 + 2] = 0;
            alphas[i] = 0;
        } else {
            const color = densityToColor(n, nMin, nMax);
            colors[i * 3] = color.r;
            colors[i * 3 + 1] = color.g;
            colors[i * 3 + 2] = color.b;
            alphas[i] = 1.0;
        }
    }
    
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    geometry.setAttribute('alpha', new THREE.BufferAttribute(alphas, 1));
    
    const material = new THREE.ShaderMaterial({
        uniforms: { globalOpacity: { value: sliceOpacity } },
        vertexShader: `
            attribute float alpha;
            varying vec3 vColor;
            varying float vAlpha;
            void main() {
                vColor = color;
                vAlpha = alpha;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `,
        fragmentShader: `
            uniform float globalOpacity;
            varying vec3 vColor;
            varying float vAlpha;
            void main() {
                if (vAlpha < 0.01) discard;
                gl_FragColor = vec4(vColor, vAlpha * globalOpacity);
            }
        `,
        transparent: true,
        side: THREE.DoubleSide,
        vertexColors: true,
        depthWrite: false
    });
    
    const mesh = new THREE.Mesh(geometry, material);
    
    if (slicePlane === 'xz') {
        mesh.rotation.x = -Math.PI / 2;
    } else if (slicePlane === 'yz') {
        mesh.rotation.y = Math.PI / 2;
    }
    
    if (slicePlane === 'xy') mesh.position.z = slicePosition;
    else if (slicePlane === 'xz') mesh.position.y = slicePosition;
    else mesh.position.x = slicePosition;
    
    return mesh;
}

function rebuildDensitySlice() {
    if (sliceMesh) {
        scene.remove(sliceMesh);
        sliceMesh.geometry.dispose();
        sliceMesh.material.dispose();
    }
    
    sliceMesh = createDensitySlice();
    
    if (document.getElementById('chk-slice').checked) {
        scene.add(sliceMesh);
    }
}

// ============ EVENT DATA WITH DOI ============
function generateEvents(mission, count, color) {
    const events = [];
    const missionYears = {
        MMS: { start: 2015, end: 2024 },
        THEMIS: { start: 2007, end: 2024 },
        Cluster: { start: 2001, end: 2024 }
    };
    
    const yearRange = missionYears[mission] || { start: 2015, end: 2024 };
    
    for (let i = 0; i < count; i++) {
        const theta = Math.random() * Math.PI * 0.7;
        const phi = Math.random() * Math.PI * 2;
        const r = 8 + Math.random() * 6;
        
        const year = yearRange.start + Math.floor(Math.random() * (yearRange.end - yearRange.start + 1));
        const month = String(Math.floor(Math.random() * 12) + 1).padStart(2, '0');
        const day = String(Math.floor(Math.random() * 28) + 1).padStart(2, '0');
        
        const eventType = eventTypes[Math.floor(Math.random() * eventTypes.length)];
        const paper = getRandomPaper(eventType);
        
        events.push({
            id: `${mission}-${year}${month}${day}-${String(i + 1).padStart(2, '0')}`,
            mission: mission,
            x: r * Math.cos(theta),
            y: r * Math.sin(theta) * Math.cos(phi),
            z: r * Math.sin(theta) * Math.sin(phi),
            date: `${year}-${month}-${day}`,
            type: eventType,
            paper: paper,
            color: color
        });
    }
    return events;
}

const catalogues = {
    mms: generateEvents('MMS', 25, 0xff4444),
    themis: generateEvents('THEMIS', 20, 0x44ff44),
    cluster: generateEvents('Cluster', 15, 0xffff44)
};

const allEvents = [...catalogues.mms, ...catalogues.themis, ...catalogues.cluster];

// ============ EVENT SPHERES ============
const eventMeshes = [];
const eventGroups = { mms: [], themis: [], cluster: [] };

allEvents.forEach(evt => {
    const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(0.3, 16, 16),
        new THREE.MeshBasicMaterial({ color: evt.color })
    );
    mesh.position.set(evt.x, evt.y, evt.z);
    mesh.userData = evt;
    scene.add(mesh);
    eventMeshes.push(mesh);
    
    const key = evt.mission.toLowerCase();
    if (eventGroups[key]) eventGroups[key].push(mesh);
});

// ============ RAYCASTING & POPUP ============
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let selectedMesh = null;

renderer.domElement.addEventListener('click', (e) => {
    const rect = renderer.domElement.getBoundingClientRect();
    mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(eventMeshes.filter(m => m.visible));
    
    if (intersects.length > 0) {
        const hit = intersects[0].object;
        const evt = hit.userData;
        
        selectedMesh = hit;
        
        popupTitle.textContent = evt.id;
        popupContent.innerHTML = `
            <div class="row">
                <span class="label">Mission</span>
                <span class="value">${evt.mission}</span>
            </div>
            <div class="row">
                <span class="label">Date</span>
                <span class="value">${evt.date}</span>
            </div>
            <div class="row">
                <span class="label">Type</span>
                <span class="value">${evt.type}</span>
            </div>
            <div class="row">
                <span class="label">X (GSE)</span>
                <span class="value">${evt.x.toFixed(2)} RE</span>
            </div>
            <div class="row">
                <span class="label">Y (GSE)</span>
                <span class="value">${evt.y.toFixed(2)} RE</span>
            </div>
            <div class="row">
                <span class="label">Z (GSE)</span>
                <span class="value">${evt.z.toFixed(2)} RE</span>
            </div>
            <div class="doi-row">
                <span class="label">📄 Reference:</span>
                <a class="doi-link" href="https://doi.org/${evt.paper.doi}" target="_blank">
                    doi:${evt.paper.doi}
                </a>
                <div class="paper-title">
                    ${evt.paper.authors} (${evt.paper.year}), "${evt.paper.title}", ${evt.paper.journal}
                </div>
            </div>
        `;
        
        popup.style.display = 'block';
        popup.style.right = '20px';
        popup.style.top = '20px';
        popup.style.left = 'auto';
        
        updateConnector();
    }
});

popupClose.addEventListener('click', () => {
    popup.style.display = 'none';
    connectorLine.style.display = 'none';
    connectorDot.style.display = 'none';
    selectedMesh = null;
});

function updateConnector() {
    if (!selectedMesh || popup.style.display === 'none') {
        connectorLine.style.display = 'none';
        connectorDot.style.display = 'none';
        return;
    }
    
    const pos = selectedMesh.position.clone();
    pos.project(camera);
    
    const rect = renderer.domElement.getBoundingClientRect();
    const x3d = (pos.x * 0.5 + 0.5) * rect.width;
    const y3d = (-pos.y * 0.5 + 0.5) * rect.height;
    
    const popupRect = popup.getBoundingClientRect();
    const viewportRect = viewport.getBoundingClientRect();
    const xPopup = popupRect.left - viewportRect.left;
    const yPopup = popupRect.top - viewportRect.top + popupRect.height / 2;
    
    connectorLine.setAttribute('x1', x3d);
    connectorLine.setAttribute('y1', y3d);
    connectorLine.setAttribute('x2', xPopup);
    connectorLine.setAttribute('y2', yPopup);
    connectorLine.style.display = 'block';
    
    connectorDot.setAttribute('cx', x3d);
    connectorDot.setAttribute('cy', y3d);
    connectorDot.style.display = 'block';
}

// ============ UI HANDLERS ============
document.getElementById('chk-mp').addEventListener('change', (e) => {
    if (e.target.checked) { scene.add(mpSurface); scene.add(mpWire); }
    else { scene.remove(mpSurface); scene.remove(mpWire); }
});

document.getElementById('chk-bs').addEventListener('change', (e) => {
    if (e.target.checked) scene.add(bsSurface);
    else scene.remove(bsSurface);
});

document.getElementById('r0-slider').addEventListener('input', (e) => {
    currentR0 = parseFloat(e.target.value);
    document.getElementById('r0-val').textContent = currentR0.toFixed(1);
    rebuildBoundaries(currentR0);
});

document.getElementById('chk-mms').addEventListener('change', (e) => {
    eventGroups.mms.forEach(m => m.visible = e.target.checked);
});

document.getElementById('chk-themis').addEventListener('change', (e) => {
    eventGroups.themis.forEach(m => m.visible = e.target.checked);
});

document.getElementById('chk-cluster').addEventListener('change', (e) => {
    eventGroups.cluster.forEach(m => m.visible = e.target.checked);
});

document.getElementById('chk-slice').addEventListener('change', (e) => {
    if (e.target.checked) {
        rebuildDensitySlice();
        colorbar.style.display = 'block';
        colorbarLabels.style.display = 'flex';
        colorbarTitle.style.display = 'block';
    } else {
        if (sliceMesh) scene.remove(sliceMesh);
        colorbar.style.display = 'none';
        colorbarLabels.style.display = 'none';
        colorbarTitle.style.display = 'none';
    }
});

window.setSlicePlane = function(plane) {
    slicePlane = plane;
    
    document.querySelectorAll('#slice-plane-btns button').forEach(btn => {
        btn.classList.remove('active');
    });
    document.getElementById('btn-' + plane).classList.add('active');
    
    const axisLabel = plane === 'xy' ? 'Z' : (plane === 'xz' ? 'Y' : 'X');
    document.querySelector('#slice-slider').previousElementSibling.innerHTML = 
        `Slice ${axisLabel} position: <span id="slice-val">${slicePosition.toFixed(1)}</span> RE`;
    
    if (document.getElementById('chk-slice').checked) {
        rebuildDensitySlice();
    }
};

document.getElementById('slice-slider').addEventListener('input', (e) => {
    slicePosition = parseFloat(e.target.value);
    document.getElementById('slice-val').textContent = slicePosition.toFixed(1);
    
    if (document.getElementById('chk-slice').checked) {
        rebuildDensitySlice();
    }
});

document.getElementById('opacity-slider').addEventListener('input', (e) => {
    sliceOpacity = parseFloat(e.target.value);
    document.getElementById('opacity-val').textContent = sliceOpacity.toFixed(2);
    
    if (sliceMesh) {
        sliceMesh.material.uniforms.globalOpacity.value = sliceOpacity;
    }
});

window.setView = function(axis) {
    const d = 50;
    if (axis === 'xy') { camera.position.set(0, 0, d); camera.up.set(0, 1, 0); }
    if (axis === 'xz') { camera.position.set(0, -d, 0); camera.up.set(0, 0, 1); }
    if (axis === 'yz') { camera.position.set(d, 0, 0); camera.up.set(0, 0, 1); }
    controls.target.set(0, 0, 0);
    controls.update();
};

window.addEventListener('resize', () => {
    camera.aspect = viewport.clientWidth / viewport.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(viewport.clientWidth, viewport.clientHeight);
});

function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
    updateConnector();
}

animate();

console.log('MANGO Explorer loaded');
</script>

</body>
</html>
