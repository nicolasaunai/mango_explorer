<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MANGO Explorer + Density Slice</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            display: flex; 
            height: 100vh; 
            background: #000; 
            color: #fff; 
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        
        #sidebar {
            width: 260px;
            background: #0d0d15;
            padding: 20px;
            border-right: 1px solid #333;
            overflow-y: auto;
        }
        
        #sidebar h1 {
            font-size: 12px;
            color: #ffaa00;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }
        
        #sidebar h2 {
            font-size: 10px;
            color: #666;
            margin: 15px 0 8px;
            text-transform: uppercase;
        }
        
        .checkbox-item {
            display: flex;
            align-items: center;
            padding: 5px 0;
            font-size: 13px;
        }
        
        .checkbox-item input { margin-right: 8px; }
        
        .slider-row { margin: 10px 0; }
        
        .slider-row label {
            display: block;
            font-size: 11px;
            color: #888;
            margin-bottom: 4px;
        }
        
        .slider-row input[type="range"] { width: 100%; }
        
        .btn-row {
            display: flex;
            gap: 5px;
            margin-top: 10px;
        }
        
        .btn-row button {
            flex: 1;
            padding: 6px;
            background: #222;
            color: #fff;
            border: 1px solid #444;
            cursor: pointer;
            font-size: 11px;
        }
        
        .btn-row button:hover { background: #444; }
        .btn-row button.active { background: #664400; border-color: #ffaa00; }
        
        #viewport {
            flex: 1;
            position: relative;
        }
        
        #viewport canvas { display: block; }
        
        /* SVG Overlay */
        #svg-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
        }
        
        #connector-line {
            stroke: #ffaa00;
            stroke-width: 2;
            stroke-dasharray: 5,3;
            display: none;
        }
        
        #connector-dot {
            fill: #ffaa00;
            display: none;
        }
        
        /* Popup */
        #popup {
            position: absolute;
            display: none;
            background: rgba(10, 15, 30, 0.95);
            border: 1px solid #ffaa00;
            border-radius: 6px;
            padding: 12px 15px;
            min-width: 200px;
            font-size: 12px;
            pointer-events: auto;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        
        #popup-close {
            position: absolute;
            top: 5px; right: 8px;
            cursor: pointer;
            color: #888;
            font-size: 16px;
        }
        
        #popup-close:hover { color: #fff; }
        
        #popup h3 {
            color: #ffaa00;
            font-size: 13px;
            margin-bottom: 8px;
        }
        
        #popup .row {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
            border-bottom: 1px solid #222;
        }
        
        #popup .row:last-child { border: none; }
        #popup .label { color: #888; }
        #popup .value { color: #fff; }
        
        /* Colorbar */
        #colorbar {
            position: absolute;
            right: 20px;
            bottom: 20px;
            width: 30px;
            height: 200px;
            background: linear-gradient(to top, #000033, #0000ff, #00ffff, #ffff00, #ff0000);
            border: 1px solid #444;
            display: none;
        }
        
        #colorbar-labels {
            position: absolute;
            right: 55px;
            bottom: 20px;
            height: 200px;
            display: none;
            flex-direction: column;
            justify-content: space-between;
            font-size: 10px;
            color: #aaa;
        }
        
        #colorbar-title {
            position: absolute;
            right: 20px;
            bottom: 225px;
            font-size: 11px;
            color: #ffaa00;
            display: none;
        }
    </style>
</head>
<body>

<div id="sidebar">
    <h1>🥭 MANGO EXPLORER</h1>
    
    <h2>Boundaries</h2>
    <div class="checkbox-item">
        <input type="checkbox" id="chk-mp" checked>
        <label for="chk-mp">Magnetopause</label>
    </div>
    <div class="checkbox-item">
        <input type="checkbox" id="chk-bs" checked>
        <label for="chk-bs">Bow Shock</label>
    </div>
    
    <div class="slider-row">
        <label>Standoff R₀: <span id="r0-val">10.5</span> RE</label>
        <input type="range" id="r0-slider" min="6" max="14" step="0.5" value="10.5">
    </div>
    
    <h2>Catalogues</h2>
    <div class="checkbox-item">
        <input type="checkbox" id="chk-mms" checked>
        <label for="chk-mms">MMS (25 events)</label>
    </div>
    <div class="checkbox-item">
        <input type="checkbox" id="chk-themis" checked>
        <label for="chk-themis">THEMIS (20 events)</label>
    </div>
    <div class="checkbox-item">
        <input type="checkbox" id="chk-cluster" checked>
        <label for="chk-cluster">Cluster (15 events)</label>
    </div>
    
    <h2>Density Slice</h2>
    <div class="checkbox-item">
        <input type="checkbox" id="chk-slice">
        <label for="chk-slice">Show density plane</label>
    </div>
    
    <div class="btn-row" id="slice-plane-btns">
        <button id="btn-xy" class="active" onclick="setSlicePlane('xy')">X-Y</button>
        <button id="btn-xz" onclick="setSlicePlane('xz')">X-Z</button>
        <button id="btn-yz" onclick="setSlicePlane('yz')">Y-Z</button>
    </div>
    
    <div class="slider-row">
        <label>Slice position: <span id="slice-val">0.0</span> RE</label>
        <input type="range" id="slice-slider" min="-15" max="15" step="0.5" value="0">
    </div>
    
    <div class="slider-row">
        <label>Opacity: <span id="opacity-val">0.8</span></label>
        <input type="range" id="opacity-slider" min="0.1" max="1" step="0.05" value="0.8">
    </div>
    
    <h2>Camera</h2>
    <div class="btn-row">
        <button onclick="setView('xy')">View X-Y</button>
        <button onclick="setView('xz')">View X-Z</button>
        <button onclick="setView('yz')">View Y-Z</button>
    </div>
</div>

<div id="viewport">
    <svg id="svg-overlay">
        <line id="connector-line"/>
        <circle id="connector-dot" r="5"/>
    </svg>
    
    <div id="popup">
        <span id="popup-close">&times;</span>
        <h3 id="popup-title">Event</h3>
        <div id="popup-content"></div>
    </div>
    
    <div id="colorbar"></div>
    <div id="colorbar-labels">
        <span>50</span>
        <span>40</span>
        <span>30</span>
        <span>20</span>
        <span>10</span>
        <span>0</span>
    </div>
    <div id="colorbar-title">n [cm⁻³]</div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const viewport = document.getElementById('viewport');
const popup = document.getElementById('popup');
const popupTitle = document.getElementById('popup-title');
const popupContent = document.getElementById('popup-content');
const popupClose = document.getElementById('popup-close');
const connectorLine = document.getElementById('connector-line');
const connectorDot = document.getElementById('connector-dot');
const colorbar = document.getElementById('colorbar');
const colorbarLabels = document.getElementById('colorbar-labels');
const colorbarTitle = document.getElementById('colorbar-title');

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050510);

// Camera
const camera = new THREE.PerspectiveCamera(45, viewport.clientWidth / viewport.clientHeight, 0.1, 500);
camera.position.set(30, 20, 30);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(viewport.clientWidth, viewport.clientHeight);
viewport.appendChild(renderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// Earth
const earth = new THREE.Mesh(
    new THREE.SphereGeometry(1, 32, 32),
    new THREE.MeshBasicMaterial({ color: 0x0066cc, wireframe: true })
);
scene.add(earth);

// Axes
scene.add(new THREE.AxesHelper(8));

// ============ BOUNDARY PARAMETERS ============
let currentR0 = 10.5;
const mpAlpha = 0.6;
const bsScale = 1.35;

// ============ BOUNDARY GEOMETRY FUNCTIONS ============
function getMagnetopauseR(theta, r0) {
    return r0 * Math.pow(2 / (1 + Math.cos(theta)), mpAlpha);
}

function getBowShockR(theta, r0) {
    return r0 * bsScale * Math.pow(2 / (1 + Math.cos(theta)), mpAlpha);
}

function createMagnetopauseSurface(r0) {
    const points = [];
    for (let i = 0; i <= 50; i++) {
        const theta = (i / 50) * Math.PI * 0.85;
        const r = getMagnetopauseR(theta, r0);
        points.push(new THREE.Vector2(r * Math.sin(theta), r * Math.cos(theta)));
    }
    const geo = new THREE.LatheGeometry(points, 64);
    geo.rotateZ(-Math.PI / 2);
    return new THREE.Mesh(geo, new THREE.MeshBasicMaterial({
        color: 0x00aaff, transparent: true, opacity: 0.12,
        side: THREE.DoubleSide, depthWrite: false
    }));
}

function createMagnetopauseWire(r0) {
    const group = new THREE.Group();
    for (let p = 0; p < 12; p++) {
        const phi = (p / 12) * Math.PI * 2;
        const pts = [];
        for (let i = 0; i <= 40; i++) {
            const theta = (i / 40) * Math.PI * 0.85;
            const r = getMagnetopauseR(theta, r0);
            const x = r * Math.cos(theta);
            const rho = r * Math.sin(theta);
            pts.push(new THREE.Vector3(x, rho * Math.cos(phi), rho * Math.sin(phi)));
        }
        group.add(new THREE.Line(
            new THREE.BufferGeometry().setFromPoints(pts),
            new THREE.LineBasicMaterial({ color: 0x00ddff, transparent: true, opacity: 0.4 })
        ));
    }
    return group;
}

function createBowShockSurface(r0) {
    const points = [];
    for (let i = 0; i <= 50; i++) {
        const theta = (i / 50) * Math.PI * 0.7;
        const r = getBowShockR(theta, r0);
        points.push(new THREE.Vector2(r * Math.sin(theta), r * Math.cos(theta)));
    }
    const geo = new THREE.LatheGeometry(points, 64);
    geo.rotateZ(-Math.PI / 2);
    return new THREE.Mesh(geo, new THREE.MeshBasicMaterial({
        color: 0xff6600, transparent: true, opacity: 0.08,
        side: THREE.DoubleSide, depthWrite: false
    }));
}

let mpSurface, mpWire, bsSurface;

function rebuildBoundaries(r0) {
    if (mpSurface) scene.remove(mpSurface);
    if (mpWire) scene.remove(mpWire);
    if (bsSurface) scene.remove(bsSurface);
    
    mpSurface = createMagnetopauseSurface(r0);
    mpWire = createMagnetopauseWire(r0);
    bsSurface = createBowShockSurface(r0);
    
    if (document.getElementById('chk-mp').checked) {
        scene.add(mpSurface);
        scene.add(mpWire);
    }
    if (document.getElementById('chk-bs').checked) {
        scene.add(bsSurface);
    }
    
    // Rebuild density slice if visible
    if (document.getElementById('chk-slice').checked) {
        rebuildDensitySlice();
    }
}

rebuildBoundaries(currentR0);

// ============ MAGNETOSHEATH DENSITY MODEL ============
// Returns density in cm^-3, or NaN if outside magnetosheath
function getMagnetosheathDensity(x, y, z, r0) {
    // Convert to spherical-like coords
    const rho = Math.sqrt(y * y + z * z);
    const r = Math.sqrt(x * x + rho * rho);
    
    // Angle from +X axis (sun direction)
    const theta = Math.atan2(rho, x);
    
    // Skip if theta too large (behind Earth)
    if (theta > Math.PI * 0.7 || theta < 0) return NaN;
    
    // Get boundary radii at this theta
    const rMP = getMagnetopauseR(theta, r0);
    const rBS = getBowShockR(theta, r0);
    
    // Check if point is in magnetosheath
    if (r < rMP || r > rBS) return NaN;
    
    // Normalized position: 0 at magnetopause, 1 at bow shock
    const t = (r - rMP) / (rBS - rMP);
    
    // Density model: higher near bow shock, lower near magnetopause
    // Typical magnetosheath: ~10-50 cm^-3
    // Simple model: n = n_sw * compression * profile
    const n_sw = 5; // Solar wind density
    const compression = 4; // Shock compression ratio
    
    // Density profile: peaks just downstream of shock, decreases toward MP
    // Using a simple model: higher near shock
    const profile = 1 + 3 * Math.pow(t, 0.5); // Peaks near shock
    
    // Add some spatial variation (dawn-dusk asymmetry, etc.)
    const phi = Math.atan2(z, y);
    const asymmetry = 1 + 0.2 * Math.cos(phi); // Slight dawn-dusk variation
    
    const density = n_sw * compression * profile * asymmetry * (0.8 + 0.4 * Math.random() * 0);
    
    return density;
}

// ============ COLORMAP ============
function densityToColor(n, nMin, nMax) {
    if (isNaN(n)) return null;
    
    // Normalize to 0-1
    let t = (n - nMin) / (nMax - nMin);
    t = Math.max(0, Math.min(1, t));
    
    // Jet-like colormap
    let r, g, b;
    
    if (t < 0.25) {
        r = 0;
        g = t * 4;
        b = 1;
    } else if (t < 0.5) {
        r = 0;
        g = 1;
        b = 1 - (t - 0.25) * 4;
    } else if (t < 0.75) {
        r = (t - 0.5) * 4;
        g = 1;
        b = 0;
    } else {
        r = 1;
        g = 1 - (t - 0.75) * 4;
        b = 0;
    }
    
    return new THREE.Color(r, g, b);
}

// ============ DENSITY SLICE PLANE ============
let sliceMesh = null;
let slicePlane = 'xy'; // 'xy', 'xz', 'yz'
let slicePosition = 0;
let sliceOpacity = 0.8;

const gridSize = 100; // Resolution
const gridExtent = 20; // -20 to +20 RE

function createDensitySlice() {
    const nMin = 5;
    const nMax = 50;
    
    // Create plane geometry
    const geometry = new THREE.PlaneGeometry(gridExtent * 2, gridExtent * 2, gridSize - 1, gridSize - 1);
    
    // Get position attribute
    const positions = geometry.attributes.position;
    const colors = new Float32Array(positions.count * 3);
    const alphas = new Float32Array(positions.count);
    
    for (let i = 0; i < positions.count; i++) {
        // Get local coordinates on plane
        const u = positions.getX(i);
        const v = positions.getY(i);
        
        // Convert to world coordinates based on slice plane
        let x, y, z;
        if (slicePlane === 'xy') {
            x = u;
            y = v;
            z = slicePosition;
        } else if (slicePlane === 'xz') {
            x = u;
            y = slicePosition;
            z = v;
        } else { // yz
            x = slicePosition;
            y = u;
            z = v;
        }
        
        // Get density at this point
        const n = getMagnetosheathDensity(x, y, z, currentR0);
        
        if (isNaN(n)) {
            colors[i * 3] = 0;
            colors[i * 3 + 1] = 0;
            colors[i * 3 + 2] = 0;
            alphas[i] = 0;
        } else {
            const color = densityToColor(n, nMin, nMax);
            colors[i * 3] = color.r;
            colors[i * 3 + 1] = color.g;
            colors[i * 3 + 2] = color.b;
            alphas[i] = sliceOpacity;
        }
    }
    
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    
    // Custom shader material for per-vertex alpha
    const material = new THREE.ShaderMaterial({
        uniforms: {
            globalOpacity: { value: sliceOpacity }
        },
        vertexShader: `
            attribute float alpha;
            varying vec3 vColor;
            varying float vAlpha;
            
            void main() {
                vColor = color;
                vAlpha = alpha;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `,
        fragmentShader: `
            uniform float globalOpacity;
            varying vec3 vColor;
            varying float vAlpha;
            
            void main() {
                if (vAlpha < 0.01) discard;
                gl_FragColor = vec4(vColor, vAlpha * globalOpacity);
            }
        `,
        transparent: true,
        side: THREE.DoubleSide,
        vertexColors: true,
        depthWrite: false
    });
    
    // Add alpha attribute
    geometry.setAttribute('alpha', new THREE.BufferAttribute(alphas, 1));
    
    const mesh = new THREE.Mesh(geometry, material);
    
    // Rotate plane to correct orientation
    if (slicePlane === 'xy') {
        // Default orientation is XY, no rotation needed
    } else if (slicePlane === 'xz') {
        mesh.rotation.x = -Math.PI / 2;
    } else { // yz
        mesh.rotation.y = Math.PI / 2;
    }
    
    // Position the plane
    if (slicePlane === 'xy') {
        mesh.position.z = slicePosition;
    } else if (slicePlane === 'xz') {
        mesh.position.y = slicePosition;
    } else {
        mesh.position.x = slicePosition;
    }
    
    return mesh;
}

function rebuildDensitySlice() {
    if (sliceMesh) {
        scene.remove(sliceMesh);
        sliceMesh.geometry.dispose();
        sliceMesh.material.dispose();
    }
    
    sliceMesh = createDensitySlice();
    
    if (document.getElementById('chk-slice').checked) {
        scene.add(sliceMesh);
    }
}

// ============ EVENT DATA ============
function generateEvents(name, count, color) {
    const events = [];
    for (let i = 0; i < count; i++) {
        const theta = Math.random() * Math.PI * 0.7;
        const phi = Math.random() * Math.PI * 2;
        const r = 8 + Math.random() * 6;
        events.push({
            id: `${name}-${String(i+1).padStart(3,'0')}`,
            mission: name,
            x: r * Math.cos(theta),
            y: r * Math.sin(theta) * Math.cos(phi),
            z: r * Math.sin(theta) * Math.sin(phi),
            date: `2023-${String(Math.floor(Math.random()*12)+1).padStart(2,'0')}-${String(Math.floor(Math.random()*28)+1).padStart(2,'0')}`,
            bField: (Math.random() * 30 + 5).toFixed(1),
            density: (Math.random() * 40 + 10).toFixed(1),
            type: ['FTE', 'EDR', 'Jet', 'Current Sheet'][Math.floor(Math.random()*4)],
            color: color
        });
    }
    return events;
}

const catalogues = {
    mms: generateEvents('MMS', 25, 0xff4444),
    themis: generateEvents('THEMIS', 20, 0x44ff44),
    cluster: generateEvents('Cluster', 15, 0xffff44)
};

const allEvents = [...catalogues.mms, ...catalogues.themis, ...catalogues.cluster];

// ============ EVENT SPHERES ============
const eventMeshes = [];
const eventGroups = { mms: [], themis: [], cluster: [] };

allEvents.forEach(evt => {
    const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(0.3, 16, 16),
        new THREE.MeshBasicMaterial({ color: evt.color })
    );
    mesh.position.set(evt.x, evt.y, evt.z);
    mesh.userData = evt;
    scene.add(mesh);
    eventMeshes.push(mesh);
    
    const key = evt.mission.toLowerCase();
    if (eventGroups[key]) eventGroups[key].push(mesh);
});

// ============ RAYCASTING & POPUP ============
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let selectedMesh = null;

renderer.domElement.addEventListener('click', (e) => {
    const rect = renderer.domElement.getBoundingClientRect();
    mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(eventMeshes.filter(m => m.visible));
    
    if (intersects.length > 0) {
        const hit = intersects[0].object;
        const evt = hit.userData;
        
        selectedMesh = hit;
        
        popupTitle.textContent = evt.id;
        popupContent.innerHTML = `
            <div class="row"><span class="label">Mission</span><span class="value">${evt.mission}</span></div>
            <div class="row"><span class="label">Date</span><span class="value">${evt.date}</span></div>
            <div class="row"><span class="label">Type</span><span class="value">${evt.type}</span></div>
            <div class="row"><span class="label">X (GSE)</span><span class="value">${evt.x.toFixed(2)} RE</span></div>
            <div class="row"><span class="label">Y (GSE)</span><span class="value">${evt.y.toFixed(2)} RE</span></div>
            <div class="row"><span class="label">Z (GSE)</span><span class="value">${evt.z.toFixed(2)} RE</span></div>
            <div class="row"><span class="label">|B|</span><span class="value">${evt.bField} nT</span></div>
            <div class="row"><span class="label">n</span><span class="value">${evt.density} cm⁻³</span></div>
        `;
        
        popup.style.display = 'block';
        popup.style.right = '20px';
        popup.style.top = '20px';
        popup.style.left = 'auto';
        
        updateConnector();
    }
});

popupClose.addEventListener('click', () => {
    popup.style.display = 'none';
    connectorLine.style.display = 'none';
    connectorDot.style.display = 'none';
    selectedMesh = null;
});

function updateConnector() {
    if (!selectedMesh || popup.style.display === 'none') {
        connectorLine.style.display = 'none';
        connectorDot.style.display = 'none';
        return;
    }
    
    const pos = selectedMesh.position.clone();
    pos.project(camera);
    
    const rect = renderer.domElement.getBoundingClientRect();
    const x3d = (pos.x * 0.5 + 0.5) * rect.width;
    const y3d = (-pos.y * 0.5 + 0.5) * rect.height;
    
    const popupRect = popup.getBoundingClientRect();
    const viewportRect = viewport.getBoundingClientRect();
    const xPopup = popupRect.left - viewportRect.left;
    const yPopup = popupRect.top - viewportRect.top + popupRect.height / 2;
    
    connectorLine.setAttribute('x1', x3d);
    connectorLine.setAttribute('y1', y3d);
    connectorLine.setAttribute('x2', xPopup);
    connectorLine.setAttribute('y2', yPopup);
    connectorLine.style.display = 'block';
    
    connectorDot.setAttribute('cx', x3d);
    connectorDot.setAttribute('cy', y3d);
    connectorDot.style.display = 'block';
}

// ============ UI HANDLERS ============
document.getElementById('chk-mp').addEventListener('change', (e) => {
    if (e.target.checked) { scene.add(mpSurface); scene.add(mpWire); }
    else { scene.remove(mpSurface); scene.remove(mpWire); }
});

document.getElementById('chk-bs').addEventListener('change', (e) => {
    if (e.target.checked) scene.add(bsSurface);
    else scene.remove(bsSurface);
});

document.getElementById('r0-slider').addEventListener('input', (e) => {
    currentR0 = parseFloat(e.target.value);
    document.getElementById('r0-val').textContent = currentR0.toFixed(1);
    rebuildBoundaries(currentR0);
});

document.getElementById('chk-mms').addEventListener('change', (e) => {
    eventGroups.mms.forEach(m => m.visible = e.target.checked);
});

document.getElementById('chk-themis').addEventListener('change', (e) => {
    eventGroups.themis.forEach(m => m.visible = e.target.checked);
});

document.getElementById('chk-cluster').addEventListener('change', (e) => {
    eventGroups.cluster.forEach(m => m.visible = e.target.checked);
});

// Density slice controls
document.getElementById('chk-slice').addEventListener('change', (e) => {
    if (e.target.checked) {
        rebuildDensitySlice();
        colorbar.style.display = 'block';
        colorbarLabels.style.display = 'flex';
        colorbarTitle.style.display = 'block';
    } else {
        if (sliceMesh) scene.remove(sliceMesh);
        colorbar.style.display = 'none';
        colorbarLabels.style.display = 'none';
        colorbarTitle.style.display = 'none';
    }
});

window.setSlicePlane = function(plane) {
    slicePlane = plane;
    
    // Update button styles
    document.querySelectorAll('#slice-plane-btns button').forEach(btn => {
        btn.classList.remove('active');
    });
    document.getElementById('btn-' + plane).classList.add('active');
    
    // Update slider label
    const axisLabel = plane === 'xy' ? 'Z' : (plane === 'xz' ? 'Y' : 'X');
    document.querySelector('#slice-slider').previousElementSibling.innerHTML = 
        `Slice ${axisLabel} position: <span id="slice-val">${slicePosition.toFixed(1)}</span> RE`;
    
    if (document.getElementById('chk-slice').checked) {
        rebuildDensitySlice();
    }
};

document.getElementById('slice-slider').addEventListener('input', (e) => {
    slicePosition = parseFloat(e.target.value);
    document.getElementById('slice-val').textContent = slicePosition.toFixed(1);
    
    if (document.getElementById('chk-slice').checked) {
        rebuildDensitySlice();
    }
});

document.getElementById('opacity-slider').addEventListener('input', (e) => {
    sliceOpacity = parseFloat(e.target.value);
    document.getElementById('opacity-val').textContent = sliceOpacity.toFixed(2);
    
    if (sliceMesh) {
        sliceMesh.material.uniforms.globalOpacity.value = sliceOpacity;
    }
});

// ============ VIEW BUTTONS ============
window.setView = function(axis) {
    const d = 50;
    if (axis === 'xy') { camera.position.set(0, 0, d); camera.up.set(0, 1, 0); }
    if (axis === 'xz') { camera.position.set(0, -d, 0); camera.up.set(0, 0, 1); }
    if (axis === 'yz') { camera.position.set(d, 0, 0); camera.up.set(0, 0, 1); }
    controls.target.set(0, 0, 0);
    controls.update();
};

// ============ RESIZE ============
window.addEventListener('resize', () => {
    camera.aspect = viewport.clientWidth / viewport.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(viewport.clientWidth, viewport.clientHeight);
});

// ============ ANIMATE ============
function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
    updateConnector();
}

animate();

console.log('MANGO Explorer with density slice loaded!');
</script>

</body>
</html>
